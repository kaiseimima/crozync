<title>Crozync - Photo Diary</title>
<!-- Plus Jakarta Sans Font -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS v3 with Plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#ef8e39',
            darkBg: '#0a0a0a',
            surface: '#1a1a1a',
          },
          fontFamily: {
            sans: ['Plus Jakarta Sans', 'sans-serif'],
          },
          borderRadius: {
            'custom': '12px',
          },
          boxShadow: {
            'sticker': '0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -1px rgba(0, 0, 0, 0.2)',
            'sticker-hover': '0 10px 15px -3px rgba(0, 0, 0, 0.4), 0 4px 6px -2px rgba(0, 0, 0, 0.2)',
            'glow-primary': '0 0 15px 2px rgba(239, 142, 57, 0.4)',
          }
        }
      }
    }
  </script>
<style data-purpose="sticker-aesthetics">
    /* Simulating a physical sticker look with a white border and slight rotation */
    .sticker-pair-container {
      perspective: 1000px;
    }
    .sticker {
      background-color: white;
      padding: 4px;
      transition: transform 0.2s ease-in-out;
    }
    .sticker-left {
      transform: rotate(-2deg);
      z-index: 10;
    }
    .sticker-right {
      transform: rotate(3deg);
      margin-left: -15px; /* Overlap effect */
      z-index: 5;
    }
    .sticker-slot-empty {
      border: 2px dashed #444;
      background: rgba(255, 255, 255, 0.05);
    }
    /* Hide scrollbar but keep functionality */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body class="bg-darkBg text-white font-sans antialiased overflow-hidden">
<!-- BEGIN: MainContainer -->
<main class="flex flex-col h-screen w-full max-w-md mx-auto relative overflow-hidden">
<!-- BEGIN: Header -->
<header class="p-6 flex items-center justify-between" data-purpose="navigation">
<!-- Back to Dashboard Link -->
<a aria-label="Back" class="p-2 hover:bg-surface rounded-custom transition-colors" href="#">
<svg fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" viewbox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="m15 18-6-6 6-6"></path></svg>

<!-- Minimalist Logo or Brand Mark -->
<div class="w-8 h-8 rounded-full bg-primary flex items-center justify-center">
<div class="w-4 h-4 bg-white rounded-sm rotate-45"></div>
</div>
</header>
<!-- END: Header -->
<!-- BEGIN: Feed -->
<div class="flex-1 overflow-y-auto px-6 pb-24 no-scrollbar" data-purpose="photo-grid">
<!-- Current Day / Active Turn Block -->
<section class="mb-10" data-purpose="current-turn">
<div class="flex justify-center items-center py-4 sticker-pair-container">
<!-- User's Slot (Active/Glowing) -->
<div class="sticker sticker-left w-36 h-48 rounded-custom shadow-glow-primary border-2 border-primary/50 flex flex-col items-center justify-center bg-darkBg overflow-hidden">
<div class="w-12 h-12 rounded-full border-2 border-primary border-t-transparent animate-spin mb-4"></div>
<div class="w-8 h-8 rounded-full bg-primary/20 flex items-center justify-center">
<svg fill="none" height="20" stroke="#ef8e39" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
</div>
</div>
<!-- Partner's Slot (Waiting/Locked) -->
<div class="sticker sticker-right w-36 h-48 rounded-custom shadow-sticker sticker-slot-empty flex items-center justify-center">
<svg fill="none" height="24" stroke="#444" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><rect height="11" rx="2" ry="2" width="18" x="3" y="11"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>

</div>
