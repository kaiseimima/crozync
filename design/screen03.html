<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Crozync - Request Session</title>
<!-- Load Tailwind CSS with plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Font: Plus Jakarta Sans -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- BEGIN: Tailwind Configuration -->
<script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: '#ef8e39',
            darkBg: '#0f1115',
            darkCard: '#1a1d23',
          },
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'sans-serif'],
          },
          borderRadius: {
            'twelve': '12px',
          },
          animation: {
            'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'glow-pulse': 'glow 2s infinite ease-in-out',
          },
          keyframes: {
            glow: {
              '0%, 100%': { 'box-shadow': '0 0 15px rgba(239, 142, 57, 0.4)' },
              '50%': { 'box-shadow': '0 0 30px rgba(239, 142, 57, 0.7)' },
            }
          }
        }
      }
    }
  </script>
<!-- END: Tailwind Configuration -->
<!-- BEGIN: Custom Styles -->
<style data-purpose="custom-effects">
    body {
      background-color: #0f1115;
      color: #ffffff;
      font-family: 'Plus Jakarta Sans', sans-serif;
      overflow: hidden; /* Mobile app feel */
    }
    .neon-timer {
      text-shadow: 0 0 10px rgba(239, 142, 57, 0.8), 0 0 20px rgba(239, 142, 57, 0.4);
    }
    .sticker-border {
      border: 3px solid #ffffff;
      box-shadow: 4px 4px 0px rgba(0,0,0,0.2);
    }
    .blur-partner {
      filter: blur(8px);
    }
    .gradient-overlay {
      background: linear-gradient(to bottom, rgba(15, 17, 21, 0) 0%, rgba(15, 17, 21, 0.9) 100%);
    }
  </style>
<!-- END: Custom Styles -->
</head>
<body class="bg-darkBg text-white h-screen flex flex-col font-sans antialiased">
<!-- BEGIN: Header -->
<header class="p-6 flex justify-between items-center z-10">
<div class="flex items-center gap-2">
<div class="w-8 h-8 bg-brand rounded-twelve flex items-center justify-center">
<svg class="w-5 h-5 text-darkBg" fill="none" stroke="currentColor" stroke-width="2.5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 4.5v15m7.5-7.5h-15" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</div>
<h1 class="text-xl font-bold tracking-tight">Crozync</h1>
</div>
<button class="w-10 h-10 rounded-full bg-darkCard flex items-center justify-center border border-white/10">
<svg class="h-6 w-6 text-gray-400" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M6 18L18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
</header>
<!-- END: Header -->
<!-- BEGIN: Main Content Area -->
<main class="flex-grow flex flex-col items-center justify-center relative px-8 pb-24">
<!-- Central Session UI -->
<div class="w-full max-w-sm flex flex-col items-center gap-12" data-purpose="session-container">
<!-- Timer Circle -->
<div class="relative flex items-center justify-center" data-purpose="timer-display">
<!-- Neon Glow Background -->
<div class="absolute w-48 h-48 bg-brand/10 rounded-full blur-3xl animate-glow-pulse"></div>
<!-- Timer SVG Ring -->
<svg class="w-56 h-56 transform -rotate-90">
<circle class="text-white/10" cx="112" cy="112" fill="transparent" r="100" stroke="currentColor" stroke-width="6"></circle>
<circle class="text-brand transition-all duration-1000" cx="112" cy="112" fill="transparent" r="100" stroke="currentColor" stroke-dasharray="628" stroke-dashoffset="150" stroke-linecap="round" stroke-width="6"></circle>
</svg>
<!-- Countdown Text -->
<div class="absolute flex flex-col items-center">
<span class="text-6xl font-extrabold neon-timer tracking-tighter" id="countdown">03:00</span>
<span class="text-xs font-semibold text-brand/80 uppercase tracking-widest mt-1">Remaining</span>
</div>
</div>
<!-- Partner Status Grid -->
<div class="grid grid-cols-2 gap-6 w-full" data-purpose="partner-status">
<!-- User Placeholder (Active Camera Simulation) -->
<div class="flex flex-col items-center gap-3">
<div class="w-32 h-32 rounded-twelve overflow-hidden sticker-border bg-darkCard relative">
<img alt="User Camera" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCyp7i5ijPznBh_htEgw4HuC7y33K13qKg4zbVUt0oOEzeBX13dlODg3ybGm8UJb-8AovEkpJpMk3fkP3dwCfBIMGReg7uv5qgvVaAahoXmBUGLS8whNJylr4xsTWEG-xWlh3A-EvZoWb3pPMz1F1G2HqLwW62rdTz3-QQNh_z-YF221LKZ3OCxoIiMG7I0XkMuAWlKD1QXushFEYow0yzZCjYbXliCK8adE60_4D8jtI7WkGvPDugp64-7gz4Mmij3ZvZxogPbtwWX"/>
<div class="absolute bottom-2 left-2 px-2 py-0.5 bg-brand text-[10px] font-bold text-darkBg rounded-full uppercase">You</div>
</div>
<p class="text-xs font-medium text-gray-400">Ready</p>
</div>
<!-- Partner Placeholder (Waiting State) -->
<div class="flex flex-col items-center gap-3">
<div class="w-32 h-32 rounded-twelve overflow-hidden border-2 border-dashed border-white/20 bg-white/5 flex items-center justify-center relative animate-pulse-slow" id="partner-box">
<div class="flex flex-col items-center" id="partner-waiting">
<svg class="h-8 w-8 text-white/20 mb-2" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<!-- Glowing Tick (Shown when partner responds) -->
<div class="hidden absolute inset-0 bg-brand/20 flex items-center justify-center" id="partner-success">
<div class="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-lg">
<svg class="h-8 w-8 text-brand" fill="currentColor" viewbox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" fill-rule="evenodd"></path>
</svg>
</div>
</div>
</div>
<p class="text-xs font-medium text-gray-500 italic" id="partner-status-text">Waiting for partner...</p>
</div>
</div>
</div>
<!-- Timeout Indicator (Hidden by default) -->
<div class="hidden absolute bottom-40 px-6 py-3 bg-red-500/20 border border-red-500/50 rounded-twelve backdrop-blur-md" id="timeout-msg">
<p class="text-red-400 text-sm font-semibold flex items-center gap-2">
<svg class="h-5 w-5" fill="currentColor" viewbox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z" fill-rule="evenodd"></path>
</svg>
         Session Timed Out
       </p>
</div>
</main>
<!-- END: Main Content Area -->
<!-- BEGIN: Camera Interface Bottom Bar -->
<footer class="fixed bottom-0 left-0 w-full p-8 pb-12 bg-gradient-to-t from-darkBg to-transparent pointer-events-none">
<div class="flex justify-around items-center pointer-events-auto">
<!-- Mute/Settings -->
<button class="w-14 h-14 rounded-full bg-darkCard/80 border border-white/10 flex items-center justify-center text-white/60">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
<!-- Main Action: Cancel/End -->
<button class="w-20 h-20 rounded-full bg-brand p-1 shadow-2xl shadow-brand/20">
<div class="w-full h-full rounded-full border-2 border-darkBg/20 flex items-center justify-center">
<div class="w-6 h-6 bg-darkBg rounded-sm"></div>
</div>
</button>
<!-- Flip Camera -->
<button class="w-14 h-14 rounded-full bg-darkCard/80 border border-white/10 flex items-center justify-center text-white/60">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
</div>
</footer>
<!-- END: Camera Interface Bottom Bar -->
<!-- BEGIN: Logic Script -->
<script data-purpose="session-logic">
    // Simple state simulation for demonstration
    let timeLeft = 180; // 3 minutes
    const timerDisplay = document.getElementById('countdown');
    const partnerBox = document.getElementById('partner-box');
    const partnerWaiting = document.getElementById('partner-waiting');
    const partnerSuccess = document.getElementById('partner-success');
    const partnerStatusText = document.getElementById('partner-status-text');
    const timeoutMsg = document.getElementById('timeout-msg');

    function updateTimer() {
      if (timeLeft <= 0) {
        timerDisplay.innerText = "00:00";
        showTimeout();
        return;
      }
      const minutes = Math.floor(timeLeft / 60);
      const seconds = timeLeft % 60;
      timerDisplay.innerText = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
      timeLeft--;
    }

    function showTimeout() {
      timeoutMsg.classList.remove('hidden');
      partnerBox.classList.remove('animate-pulse-slow');
      partnerBox.style.opacity = "0.5";
      partnerStatusText.innerText = "Partner unavailable";
    }

    // Simulate partner joining after 5 seconds
    setTimeout(() => {
      if (timeLeft > 0) {
        partnerWaiting.classList.add('hidden');
        partnerSuccess.classList.remove('hidden');
        partnerBox.classList.remove('animate-pulse-slow');
        partnerBox.classList.add('animate-glow-pulse');
        partnerBox.classList.remove('border-dashed');
        partnerBox.classList.add('border-brand', 'sticker-border');
        partnerStatusText.innerText = "Partner joined!";
        partnerStatusText.classList.remove('text-gray-500');
        partnerStatusText.classList.add('text-brand', 'font-bold');
      }
    }, 5000);

    setInterval(updateTimer, 1000);
  </script>
<!-- END: Logic Script -->
</body></html>
